<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#070d0b"/>

  <!-- Camera body -->
  <rect x="3" y="10" width="26" height="18" rx="2.5" stroke="#a88753" stroke-width="1.4" opacity="0.9"/>

  <!-- Camera bump (top center) -->
  <path d="M12 10 L12 7.5 Q12 6 13.5 6 L18.5 6 Q20 6 20 7.5 L20 10" stroke="#a88753" stroke-width="1.4" opacity="0.9"/>

  <!-- Lens ring outer -->
  <circle cx="16" cy="19" r="6" stroke="#a88753" stroke-width="1.2" opacity="0.8"/>

  <!-- Lens ring inner -->
  <circle cx="16" cy="19" r="3.5" stroke="#a88753" stroke-width="0.8" opacity="0.5"/>

  <!-- R letter inside lens -->
  <text x="16" y="22.5" font-family="Georgia, 'Times New Roman', serif" font-size="5.5" font-weight="700" fill="#a88753" text-anchor="middle">R</text>

  <!-- Shutter button dot -->
  <circle cx="25" cy="13" r="1.5" fill="#a88753" opacity="0.7"/>
</svg>
